<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Disk Scheduling Simulator</title>

<link rel="stylesheet" href="simulator.css">

<!-- ✅ IMPORTANT (Graph ke liye) -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<!--NAVBAR -->
<nav class="navbar">
  <h2>Disk Scheduler</h2>
  <ul>
    <li><a href="index.html">Home</a></li>
    <li><a href="algorithms.html">Algorithms</a></li>
    <li><a href="simulator.html">Simulator</a></li>
    <li><a href="about.html">About</a></li>
  </ul>
</nav>
<h1>Disk Scheduling Simulator</h1>

<div class="container">

  <!-- INPUT -->
  <div class="card">
    <h3>Enter Disk Requests</h3>

    <input type="text" id="requests" placeholder="e.g 98,183,37,122">
    <input type="number" id="head" placeholder="Initial Head Position">

    <p>Range: 0 - 200</p>

    <button onclick="runAlgo('fcfs')">FCFS</button>
    <button onclick="runAlgo('sstf')">SSTF</button>
    <button onclick="runAlgo('scan')">SCAN</button>
    <button onclick="runAlgo('cscan')">C-SCAN</button>
    <button onclick="runAlgo('look')">LOOK</button>
    <button onclick="runAlgo('clook')">C-LOOK</button>

    <button onclick="resetAll()">Reset</button>
  </div>

  <!-- OUTPUT -->
  <div class="card">
    <h3>Performance Metrics</h3>
    <div id="output"></div>
  </div>

</div>

<!-- GRAPHS -->
<h2>Visualization</h2>

<div class="graphs">

  <div class="card">
    <h3>Head Movement</h3>
    <canvas id="chart1"></canvas>
  </div>

  <div class="card">
    <h3>Seek Time Comparison</h3>
    <canvas id="chart2"></canvas>
  </div>

  <div class="card">
    <h3>Algorithm Comparison</h3>
    <canvas id="chart3"></canvas>
  </div>

</div>

<script src="script.js"></script>
<div class="footer">
   © 2026 Disk Scheduling Project | Created by Hammad
</div>
</body>
</html>
